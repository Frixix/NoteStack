<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOTESTACK</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <h1 class="logo">NOTESTACK</h1>

        <div class="notebooks">

            <h2>Cuadernos</h2>

            <ul id="notebook-list">
                <!-- notebooks -->
            </ul>

        </div>

        <button id="new-notebook">
            + Nuevo cuaderno
        </button>

    </aside>

    <main class="editor">

        <input
            type="text"
            id="note-title"
            placeholder="Título de la nota"
        >

        <textarea
            id="note-content"
            placeholder="Escribe tu nota..."
        ></textarea>

    </main>

</div>

<script src="js/app.js"></script>

</body>

</html>
