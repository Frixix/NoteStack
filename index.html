<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOTESTACK</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h1 class="logo">NOTESTACK</h1>

        <button id="new-notebook">
            + Nuevo cuaderno
        </button>

        <ul id="notebook-list"></ul>

    </aside>


    <!-- Lista de notas -->
    <section class="notes-panel">

        <div class="notes-header">
            <h2>Notas</h2>
            <button id="new-note">+</button>
        </div>

        <ul id="note-list"></ul>

    </section>


    <!-- Editor -->
    <main class="editor">

        <input
            type="text"
            id="note-title"
            placeholder="Título de la nota"
        >

        <textarea
            id="note-content"
            placeholder="Empieza a escribir..."
        ></textarea>

    </main>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
