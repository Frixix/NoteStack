<!DOCTYPE html>
<html lang="es">

<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOTESTACK</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h1 class="logo">NOTESTACK</h1>

        <button id="new-notebook">
            Nuevo cuaderno
        </button>

        <div id="notebook-form" class="notebook-form hidden">
            <input
                type="text"
                id="notebook-name-input"
                placeholder="Nombre del cuaderno"
                maxlength="50"
            >
            <div class="notebook-form-actions">
                <button id="save-notebook" type="button">Crear</button>
                <button id="cancel-notebook" type="button">Cancelar</button>
            </div>
        </div>

        <ul id="notebook-list" aria-label="Lista de cuadernos"></ul>

        <div class="sidebar-actions">
            <button id="rename-notebook" type="button" class="ghost-button" title="Renombrar cuaderno activo">
                Renombrar
            </button>
            <button id="delete-notebook" type="button" class="ghost-button" title="Eliminar cuaderno activo">
                Eliminar
            </button>
        </div>

    </aside>


    <!-- Lista de notas -->
    <section class="notes-panel" id="notes-panel">
        <div class="notes-panel-inner" id="notes-panel-inner">
            <div class="notes-header">
                <div class="notes-header-top">
                    <h2>Notas</h2>
                    <button id="toggle-notes-panel" type="button" class="ghost-button" aria-label="Ocultar panel de notas">
                        Ocultar panel
                    </button>
                </div>
                <div class="notes-actions">
                    <button id="delete-note" type="button" class="ghost-button" title="Eliminar nota activa">
                        Eliminar
                    </button>
                    <button id="new-note" type="button" aria-label="Crear nueva nota">+</button>
                </div>
            </div>

            <div class="notes-search">
                <input
                    type="search"
                    id="note-search"
                    placeholder="Buscar por titulo o contenido"
                    autocomplete="off"
                >
            </div>

            <ul id="note-list" aria-label="Lista de notas"></ul>
            <div id="notes-empty-state" class="empty-state hidden" aria-live="polite">
                <p id="notes-empty-title" class="empty-state-title"></p>
                <p id="notes-empty-message" class="empty-state-message"></p>
            </div>

        </div>
        <button id="notes-panel-tab" class="notes-panel-tab" type="button" aria-label="Mostrar panel de notas">
            Notas
        </button>
    </section>


    <!-- Editor -->
    <main class="editor">

        <input
            type="text"
            id="note-title"
            placeholder="Título de la nota"
        >

        <textarea
            id="note-content"
            placeholder="Empieza a escribir..."
        ></textarea>

    </main>

</div>

<script src="js/services/storageService.js"></script>
<script src="js/services/noteService.js"></script>
<script src="js/services/notebookService.js"></script>
<script src="js/controllers/noteController.js"></script>
<script src="js/app.js"></script>

</body>
</html>
